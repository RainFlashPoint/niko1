<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贷款申请</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      width: 90%;
      max-width: 400px;
      background: white;
      border-radius: 16px;
      padding: 40px 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo { 
      text-align: center; 
      font-size: 48px; 
      margin-bottom: 20px; 
    }
    h1 { 
      text-align: center; 
      color: #333; 
      font-size: 24px; 
      margin-bottom: 30px; 
    }
    .form-group { margin-bottom: 20px; }
    label { 
      display: block; 
      color: #666; 
      margin-bottom: 8px; 
      font-size: 14px; 
    }
    input, select {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.3s;
    }
    input:focus, select:focus { border-color: #667eea; }
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    
    /* 离线状态 */
    .offline {
      text-align: center;
      padding: 40px;
    }
    .offline-icon { font-size: 64px; margin-bottom: 20px; }
    .offline h2 { color: #333; margin-bottom: 10px; }
    .offline p { color: #999; }
    
    .loading { text-align: center; padding: 60px; }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      <p>加载中...</p>
    </div>
  </div>

  <script>
    // 获取 URL 参数 - 支持 ?path=xxx 或 #xxx 或路径直接访问
    const hash = window.location.hash.slice(1);
    const urlParams = new URLSearchParams(window.location.search);
    const path = urlParams.get('path') || hash || window.location.pathname.split('/').filter(p => p).pop() || '';
    
    // 检查落地页状态
    async function checkStatus() {
      try {
        // 由于这是静态页面，我们用 JSONP 或者直接存储的方式来检查状态
        // 这里用简单的方式：把落地页配置存在 localStorage 里（模拟）
        
        // 实际生产中，这里应该调用后端 API
        // const res = await fetch(API_BASE + '/landing/' + path);
        
        // 模拟：检查 localStorage
        const config = localStorage.getItem('lp_config_' + path);
        
        if (config) {
          const data = JSON.parse(config);
          if (data.status) {
            showForm(data);
          } else {
            showOffline();
          }
        } else {
          // 没有配置，显示表单（默认上线）
          showForm({ title: '贷款申请', productName: '信用贷款' });
        }
      } catch (e) {
        console.error(e);
        showOffline();
      }
    }
    
    function showOffline() {
      document.getElementById('app').innerHTML = `
        <div class="container offline">
          <div class="offline-icon">😔</div>
          <h2>页面已下线</h2>
          <p>抱歉，该页面暂时不可用</p>
        </div>
      `;
    }
    
    function showForm(config) {
      document.getElementById('app').innerHTML = `
        <div class="container">
          <div class="logo">💰</div>
          <h1>${config.title || '贷款申请'}</h1>
          <form id="lpForm">
            <div class="form-group">
              <label>姓名</label>
              <input type="text" name="name" required placeholder="请输入姓名">
            </div>
            <div class="form-group">
              <label>手机号</label>
              <input type="tel" name="phone" required placeholder="请输入手机号">
            </div>
            <div class="form-group">
              <label>贷款金额</label>
              <select name="amount" required>
                <option value="">请选择</option>
                <option value="1-5万">1-5万</option>
                <option value="5-10万">5-10万</option>
                <option value="10-20万">10-20万</option>
                <option value="20万以上">20万以上</option>
              </select>
            </div>
            <div class="form-group">
              <label>城市</label>
              <input type="text" name="city" required placeholder="请输入城市">
            </div>
            <button type="submit" class="submit-btn">立即申请</button>
          </form>
        </div>
      `;
      
      // 表单提交
      document.getElementById('lpForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const formData = new FormData(this);
        const data = {
          path: path,
          name: formData.get('name'),
          phone: formData.get('phone'),
          amount: formData.get('amount'),
          city: formData.get('city'),
          createTime: new Date().toISOString()
        };
        
        // 提交到 API（这里用 localStorage 模拟）
        const leads = JSON.parse(localStorage.getItem('lp_leads') || '[]');
        leads.push(data);
        localStorage.setItem('lp_leads', JSON.stringify(leads));
        
        alert('提交成功！我们会尽快联系您！');
        this.reset();
      });
    }
    
    // 初始化
    checkStatus();
  </script>
</body>
</html>
