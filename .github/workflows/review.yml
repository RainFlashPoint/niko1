name: Code Review

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint || true

      - name: Build check
        run: npm run build

      - name: Get git diff
        id: diff
        run: |
          echo "changed_files=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

      - name: Send review to DingTalk
        if: success() || failure()
        env:
          DD_WEBHOOK: ${{ secrets.DD_WEBHOOK_PD }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          CHANGED_FILES: ${{ steps.diff.outputs.changed_files }}
          BUILD_STATUS: ${{ job.status }}
        run: |
          # 构建审查消息
          if [ "$BUILD_STATUS" == "success" ]; then
            STATUS_EMOJI="✅"
            STATUS_TEXT="通过"
          else
            STATUS_EMOJI="❌"
            STATUS_TEXT="失败"
          fi

          # 获取最后提交的变更文件
          FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "无变更")

          MESSAGE="## 📝 代码审查报告

  **仓库**: niko
  **提交**: $COMMIT_MSG
  **状态**: $STATUS_EMOJI $STATUS_TEXT

  **变更文件**:
  \`\`\`
  $FILES
  \`\`\`

  **构建结果**: $BUILD_STATUS"

          # 发送钉钉消息
          curl -X POST "$DD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"msgtype\": \"markdown\", \"markdown\": {\"title\": \"代码审查\", \"text\": \"$MESSAGE\"}}"
